AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Customer Support Ticket Management System — Lambda + API Gateway

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Environment:
      Variables:
        PYTHONPATH: /var/task
        LOG_LEVEL: INFO

Parameters:
  GroqApiKey:
    Type: String
    NoEcho: true
    Description: Groq API key

  MongoUri:
    Type: String
    NoEcho: true
    Description: MongoDB Atlas connection URI

  MongoDbName:
    Type: String
    Default: customer_tickets

  FaqCollection:
    Type: String
    Default: faqs

  TicketsCollection:
    Type: String
    Default: tickets

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

Resources:

  # ── API Gateway ──────────────────────────────────
  TicketApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "ticket-mgmt-api-${Environment}"
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'*'"
        AllowHeaders: "'*'"
        AllowOrigin: "'*'"

  # ── Lambda Function ──────────────────────────────
  TicketFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ticket-mgmt-${Environment}"
      PackageType: Image        # ← tells SAM to use container image
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          MONGO_URI: !Ref MongoUri
          MONGO_DB_NAME: !Ref MongoDbName
          FAQ_COLLECTION: !Ref FaqCollection
          TICKETS_COLLECTION: !Ref TicketsCollection
          TICKET_ID_PREFIX: TKT
          FAQ_SIMILARITY_THRESHOLD: "0.75"
          CONFIDENCE_THRESHOLD: "0.7"
          TEMPERATURE: "0.7"
          API_HOST: "0.0.0.0"
          API_PORT: "8000"
          LOG_FILE: "/tmp/ticket_system.log"
      Events:
        ProxyApi:
          Type: Api
          Properties:
            RestApiId: !Ref TicketApi
            Path: /{proxy+}
            Method: ANY
        RootApi:
          Type: Api
          Properties:
            RestApiId: !Ref TicketApi
            Path: /
            Method: ANY

    Metadata:
      # SAM reads this to: build image → tag → push to ECR → set ImageUri
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile

  # ── IAM Role ─────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ticket-mgmt-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaLogsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${TicketApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "TicketApiUrl-${Environment}"

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TicketFunction.Arn
    Export:
      Name: !Sub "TicketFunctionArn-${Environment}"