name: Deploy Docker Image to AWS Lambda

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: customer_support

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t customer_support .

      - name: Tag Docker Image
        run: |
          docker tag customer_support:latest \
          601063790499.dkr.ecr.ap-south-1.amazonaws.com/customer_support:latest

      - name: Push Docker Image
        run: |
          docker push \
          601063790499.dkr.ecr.ap-south-1.amazonaws.com/customer_support:latest
